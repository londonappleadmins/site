{{ define "main" }}
<article class="container px-2 mx-auto mb4" itemscope itemtype="http://schema.org/BlogPosting">
  <h1 class="h0 col-9 sm-width-full py-4 mt-3 inline-block" itemprop="name headline">{{ .Title }}</h1>
  <div class="col-4 sm-width-full mt-1 border-top-thin ">
    <p class="mb-3 py-2 bold h4"><time datetime="{{ .Date.Format "2006-01-02T15:04:05-07:00" }}" itemprop="datePublished">{{ .Date.Format "Jan 2, 2006" }}</time></p>
  </div>

  <div class="prose" itemprop="articleBody">
      {{ .Content }}
  </div>

</article>

<div class="container mx-auto px-2 py-2 clearfix">
  {{ with .PrevInSection }}
  <div class="col-4 sm-width-full left mr-lg-4 mt-3">
    <a class="no-underline border-top-thin py-1 block" href="{{ .Permalink }}">
      <span class="h5 bold text-accent">Previous</span>
      <p class="bold h3 link-primary mb-1">{{ .Title }}</p>
      <p>{{ .Summary | plainify | truncate 100 }}</p>
    </a>
  </div>
  {{ end }}

  {{ with .NextInSection }}
  <div class="col-4 sm-width-full right mt-3">
    <a class="no-underline border-top-thin py-1 block" href="{{ .Permalink }}">
      <span class="h5 bold text-accent">Next</span>
      <p class="bold h3 link-primary mb-1">{{ .Title }}</p>
      <p>{{ .Summary | plainify | truncate 100 }}</p>
    </a>
  </div>
  {{ end }}
</div>
{{ end }}
