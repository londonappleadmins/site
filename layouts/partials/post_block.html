{{/* Renders post date, title, and the post content. */}}
<div class="py-2 mb-2 prose">
  <a class="no-underline h5 bold text-accent" title="{{ .Permalink }}" href="{{ .Permalink }}">{{ .Date.Format "Jan 2, 2006" }}</a>
  <h2 class="h1 lh-condensed col-9 mt-0">
    <a class="link-primary" title="{{ .Permalink }}" href="{{ .Permalink }}">{{ .Title }}</a>
  </h2>
  {{ .Content }}
</div>
